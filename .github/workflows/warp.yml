name: Auto Re Warp Pure
on:
  schedule:
    - cron: '0 */3 * * *' 
  workflow_dispatch: 

jobs:
  run-renew:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip wget curl
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup host2play.gratis 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: Run Renew Script
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        #  SOCKS5_URL: ${{ secrets.SOCKS5_URL }}
        #  PROXY: 127.0.0.1:1080
        run: |
          xvfb-run --server-args="-screen 0 1920x1080x24" python main2.py

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-data
          # 收集截图、HTML 源码以及音频缓存文件用于排查
          path: |
            ./*.html
            ./*.png
            ./*.wav
          retention-days: 1
